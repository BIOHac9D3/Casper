global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:

scrape_configs:
  - job_name: "casper-backend"
    static_configs:
      - targets: ["casper-backend:9000"]
    metrics_path: "/metrics"

  - job_name: "casper-frontend"
    static_configs:
      - targets: ["casper-frontend:3000"]
    metrics_path: "/metrics"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
